name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build, unit tests and E2E
    runs-on: ubuntu-latest

    env:
      FAKESTORE_API_URL: https://fake-store-api-kevin.onrender.com
      CATALOG_DOMAIN: http://localhost:3001
      CHECKOUT_DOMAIN: http://localhost:3002

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit and component tests
        run: npm run test

      - name: Run production build
        run: npm run build

      - name: Run E2E tests
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 http://localhost:3000/products http://localhost:3000/cart --timeout 180000
          npm run test:e2e